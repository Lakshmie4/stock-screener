name: Stock Scanner

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install yfinance
        run: pip install yfinance
      
      - name: Run stock scanner
        run: python scan.py
      
      - name: Upload results           ← ADD THIS
        uses: actions/upload-artifact@v4  ← ADD THIS
        with:                             ← ADD THIS
          name: stock-analysis            ← ADD THIS
          path: |                         ← ADD THIS
            analysis.json                 ← ADD THIS
            report.txt                    ← ADD THIS
